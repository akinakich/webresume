<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>

    <style>

        body {
            margin: 0;      /*margin 0, чтобы убрать полосу сверху над контейнерами */
        }

         .containers {
            display: flex;
            position: relative;
        }
        
        .left-container {
            overflow: hidden;   /* прячет все, что находится за левым контейром (нужно для круга в левом углу) */
            position: relative;
            margin-left: 404px;
            width: 400px;
            height: 1080px;
            background: #F6FFFF;
        }

        .right-container {
            width: 712px;
            height: 1080px;
            background: #333;
        }
        
        .avatar {
            z-index: 2;
            position: relative;
            margin-left: 107px;
            margin-top: 58px;
        }

        .circle-under-avatar {
            z-index: 1;
            position: absolute;
            top: 47px;
            left: 96px;
            background: #85B2D6;
            width: 208px;
            height: 208px;
            border-radius: 50%;
            opacity: 0.2;

        }

        .circle-on-avatar {
            z-index: 3;
            position: absolute; 
            top: 47px;
            left: 233px;
            background: #53B3FF;
            width: 71px;
            height: 71px;
            border-radius: 50%;
            opacity: 0.2;
        }

        .circle-left-top {
            z-index: 0;
            position: absolute;
            top: -49px;
            left: -57px;
            background: #53B3FF80;
            width: 257px;
            height: 257px;
            border-radius: 50%;
            opacity: 0.2;
        }

        .contacts {
            position: absolute;
            top: 310px;
            left: 59px;
        }

        .contacts h2 {
            margin: 0;
            color: #000;
            font-family: Calibri, sans-serif;
            font-size: 21px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
        }
        
        .contact-item {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            align-items: center;

        }

        .contact-item img {
            width: 20px;
            height: 20px;

        }

        .contacts-item-text {
            color: #373737;
            font-family: Calibri, sans-serif;
            font-size: 14px;
            font-style: normal;
            font-weight: 300;
            line-height: normal;
        }

        .education h2 {
            margin: 0;
            color: #000;
            font-family: Calibri, sans-serif;
            font-size: 21px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
        }

        .education {
            position: absolute;
            top: 480px;
            left: 59px;
        }

        .rectangle-item {
            display: flex;
            margin-top: 16px;
            align-items: center;
            justify-content: center;
            width: 85px;
            height: 21px;
            background: #A5D9FF;
            border: 1px solid rgba(2, 6, 238, 0.33);
            border-radius: 5px;

            color: #000;
            font-family: Calibri, sans-serif;
            font-size: 12px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
        }

        .text-near-rectangle {
            display: flex;
            margin-top: 11px;
            color: #000;
            font-family: Calibri;
            font-size: 12px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
        }

    </style>
</head>
<body>
     <div class="containers">       <!-- Реализовал один контейнер, в который поместил две части страницы, левый блок и правый блок -->
        <div class="left-container">
            <img src="ava.svg" alt="avatar" class="avatar">
            <div class="circle-under-avatar"></div>
            <div class="circle-on-avatar"></div>
            <div class="circle-left-top"></div>
            <section class="contacts">
                <h2>Contacts</h2>
                <div class="contact-item">
                    <img src="github.svg" alt="github">
                    <span class="contacts-item-text">github.com/monk</span>
                </div>
                <div class="contact-item">
                    <img src="telegram.svg" alt="telegram">
                    <span class="contacts-item-text">t.me/monk</span>
                </div>
                <div class="contact-item">
                    <img src="email.svg" alt="email">
                    <span class="contacts-item-text">monk@gmail.com</span>
                </div>

            </section>

            <section class="education">
                <h2>Education</h2>
                <div class="education-item">
                    <div class="rectangle-item">2004-2008</div>
                    <span class="text-near-rectangle">Grodno State Medical College, nurse</span>
                </div>
                <div class="education-item">
                    <div class="rectangle-item">2010-2016</div>
                    <span class="text-near-rectangle">Yanka Kupala Belarusian State University, <br> Faculty of Psychology</span>
                </div>
                <div class="education-item">
                    <div class="rectangle-item">2016-2025</div>
                    <span class="text-near-rectangle">Loftschool Web Development Course</span>
                </div>
            </section>
                
            
        </div>
        <div class="right-container"></div>
    </div>
</body>
</html>
